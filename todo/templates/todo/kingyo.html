{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>金魚すくい</title>
  <link rel="stylesheet" href="{% static 'todo/style.css' %}">
  <style>
    .kingyo-card { width:min(100%,720px); margin:24px auto; background:rgba(255,255,255,0.95); color:#0f172a; padding:20px; border-radius:12px; box-shadow:0 12px 32px rgba(0,0,0,.12); }
    .pond {
      position:relative; height:340px; background:#72c7f8;
      border-radius:10px; overflow:hidden; border:1px solid rgba(0,0,0,.08);
      box-shadow: inset 0 10px 24px rgba(255,255,255,0.3), inset 0 -20px 42px rgba(8,70,120,0.2);
      isolation:isolate;
    }
    .pond::before {
      content:''; position:absolute; inset:0; pointer-events:none; opacity:1;
      background:
        radial-gradient(circle at 16% 10%, rgba(255,255,255,0.36) 0 8%, transparent 9%),
        radial-gradient(circle at 78% 16%, rgba(255,255,255,0.24) 0 7%, transparent 8%),
        radial-gradient(circle at 58% 70%, rgba(255,255,255,0.18) 0 10%, transparent 11%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.12) 0 1px, transparent 1px 14px),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 18px);
      mix-blend-mode:screen;
      animation: water-shimmer 4.8s ease-in-out infinite alternate;
    }
    .pond::after {
      content:''; position:absolute; inset:0; pointer-events:none; opacity:.9;
      background:
        radial-gradient(ellipse at 50% 110%, rgba(255,255,255,0.16), transparent 40%),
        radial-gradient(ellipse at 20% 100%, rgba(255,255,255,0.11), transparent 28%),
        radial-gradient(ellipse at 80% 100%, rgba(255,255,255,0.12), transparent 30%);
      filter:blur(1px);
      animation: water-ripple 6s ease-in-out infinite;
    }
    .pond .wave {
      position:absolute; inset:auto 0 0 0; height:42px; border-radius:50%;
      border:1px solid rgba(255,255,255,0.42);
      transform:translateY(18px) scaleX(1.06);
      opacity:.5;
      animation: wave-drift 4.2s ease-in-out infinite;
      box-shadow:0 0 0 1px rgba(255,255,255,0.12);
    }
    .pond .wave:nth-child(2) { bottom:16px; animation-duration:5.6s; opacity:.33; }
    .pond .wave:nth-child(3) { bottom:8px; animation-duration:3.8s; opacity:.24; }
    .pond .bubble {
      position:absolute; width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.65);
      bottom:26px; filter:blur(0.2px); animation: bubble-rise 4s linear infinite;
      box-shadow: inset 0 0 2px rgba(255,255,255,0.7);
    }
    .pond .bubble:nth-child(4) { left:18%; animation-duration:5.2s; opacity:.55; }
    .pond .bubble:nth-child(5) { left:42%; animation-duration:4.4s; opacity:.45; }
    .pond .bubble:nth-child(6) { left:72%; animation-duration:6s; opacity:.4; }
    @keyframes water-shimmer { 0% { transform:translateY(0px) scale(1); } 50% { transform:translateY(2px) scale(1.01); } 100% { transform:translateY(-1px) scale(1.015); } }
    @keyframes water-ripple { 0%,100% { transform:translateY(0px) scale(1); opacity:.9; } 50% { transform:translateY(3px) scale(1.02); opacity:.75; } }
    @keyframes wave-drift { 0%,100% { transform:translateY(18px) scaleX(1.06); } 50% { transform:translateY(24px) scaleX(1.16); } }
    @keyframes bubble-rise { 0% { transform:translateY(0) scale(0.9); opacity:0; } 15% { opacity:.8; } 100% { transform:translateY(-140px) scale(1.2); opacity:0; } }
    .kingyo { position:absolute; width:84px; height:56px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; transform-origin:center; transition:transform 180ms ease, left 180ms ease, top 180ms ease; }
    .kingyo .fish-image { width:100%; height:100%; object-fit:contain; pointer-events:none; filter:drop-shadow(0 3px 5px rgba(0,0,0,0.2)); background:transparent; }
    .kingyo.splash { filter: drop-shadow(0 6px 6px rgba(0,0,0,0.12)); }
    .controls { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center }
    .meta { display:flex; gap:12px; align-items:center; color:#475569; margin-top:8px }
    .poi { position:absolute; width:64px; height:64px; pointer-events:none; transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center; font-size:28px; mix-blend-mode:normal; z-index:10; }
    .poi .scoop-ring { width:56px; height:56px; border-radius:50%; background:rgba(255,255,255,0.08); border:4px solid rgba(255,255,255,0.9); box-shadow:0 6px 14px rgba(0,0,0,0.12) inset; transition: border-color 120ms ease, transform 120ms ease; }
    .poi.broken { opacity:0.7; transform:translate(-50%,-50%) scale(0.92) rotate(-10deg); animation: broken-shake 0.12s ease-in-out infinite alternate; }
    .poi.broken .scoop-ring { border-color:#f87171; box-shadow:0 0 0 8px rgba(248,113,113,0.35); background:rgba(255,255,255,0.12); }
    .poi.flash .scoop-ring { border-color: #ffd700; }
    .poi::after { content:''; position:absolute; left:50%; top:80%; width:6px; height:20px; background:#8b5e3c; transform:translateX(-50%); border-radius:4px; }
    .poi.broken::after { background:#f87171; }
    @keyframes broken-shake { from { transform:translate(-50%,-50%) scale(0.92) rotate(-7deg); } to { transform:translate(-50%,-50%) scale(0.92) rotate(-13deg); } }
  </style>
</head>
<body>
  <div class="kingyo-card">
    <h1>金魚すくい</h1>
    <p>制限時間内に金魚をすくって得点を競おう。お玉（スコップ）は3回まで使えます。</p>
    <div class="meta">
      <div>得点: <strong id="score">0</strong></div>
      <div>お玉残: <strong id="scoops">3</strong></div>
    </div>
    <div class="pond" id="pond" aria-label="金魚の池">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
    </div>

    <div class="controls">
      <button id="start">開始</button>
      <button id="stop">停止</button>
      <button id="reset">リセット</button>
      <button id="back-button" class="back-link-button" data-href="{% url 'index' %}">トップに戻る</button>
      <a class="back-link-button" href="{% url 'remove_background' %}" style="text-decoration:none; display:inline-block;">背景透過ページへ</a>
    </div>

    <div id="message" style="margin-top:8px; font-weight:700"></div>

    <script>
      const pond = document.getElementById('pond');
      const scoreEl = document.getElementById('score');
      const scoopsEl = document.getElementById('scoops');
      const messageEl = document.getElementById('message');
      const startBtn = document.getElementById('start');
      const stopBtn = document.getElementById('stop');
      const resetBtn = document.getElementById('reset');

      let spawnId = null;
      let score = 0;
      let scoops = 3;
      let running = false;

      // catch probability starts high, decays after each successful catch
      let catchProbability = 0.9;
      const decayFactor = 0.85;

      // fish management
      const fishList = new Map();
      let fishCounter = 0;
      let rafId = null;

      // poi (お玉) element follows cursor inside pond — use scoop ring instead of emoji
      const poi = document.createElement('div');
      poi.className = 'poi';
      poi.innerHTML = '<div class="scoop-ring"></div>';
      pond.appendChild(poi);
      let poiBroken = false;

      function random(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

      function createFish() {
        const id = ++fishCounter;
        const el = document.createElement('div');
        el.className = 'kingyo';
        el.innerHTML = `<img class="fish-image" src="{% static 'todo/sakana-transparent.png' %}" alt="金魚">`;
        const rect = pond.getBoundingClientRect();
        const x = random(12, Math.max(12, rect.width - 80));
        const y = random(8, Math.max(8, rect.height - 56));
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        pond.appendChild(el);

        // velocity (uniform speed)
        const speed = 0.32; // px per ms
        let angle = Math.random() * Math.PI * 2;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed * 0.6;
        const phase = Math.random() * Math.PI * 2;
        const wobble = 0.02 + Math.random() * 0.03;

        const fish = { id, el, x, y, vx, vy, speed, phase, wobble };
        fishList.set(id, fish);

        // clicking fish directly should not catch; catching only via poi click
        el.addEventListener('click', (e) => { e.stopPropagation(); });

        // auto-remove after some time
        fish._lifetime = setTimeout(() => removeFish(id), 6000 + Math.random() * 4000);
      }

      function removeFish(id) {
        const f = fishList.get(id);
        if (!f) return;
        clearTimeout(f._lifetime);
        if (f.el.parentElement) f.el.parentElement.removeChild(f.el);
        fishList.delete(id);
      }

      function animate(time) {
        const rect = pond.getBoundingClientRect();
        fishList.forEach((f) => {
          f.phase += f.wobble;
          f.x += f.vx * 16;
          f.y += f.vy * 16 + Math.sin(f.phase) * 1.4;
          // bounce
          if (f.x < 4) { f.x = 4; f.vx = Math.abs(f.vx); }
          if (f.x > rect.width - 72) { f.x = rect.width - 72; f.vx = -Math.abs(f.vx); }
          if (f.y < 4) { f.y = 4; f.vy = Math.abs(f.vy); }
          if (f.y > rect.height - 40) { f.y = rect.height - 40; f.vy = -Math.abs(f.vy); }
          f.el.style.left = f.x + 'px';
          f.el.style.top = f.y + 'px';
          // graceful body motion
          const angle = Math.atan2(f.vy + Math.cos(f.phase) * 0.08, f.vx) * 180 / Math.PI + 180;
          const scale = 0.97 + Math.sin(f.phase * 2) * 0.015;
          f.el.style.transform = `rotate(${angle}deg) scale(${scale})`;
          const img = f.el.querySelector('.fish-image');
          if (img) img.style.transform = `rotate(${Math.sin(f.phase * 2) * 12}deg)`;
        });
        rafId = requestAnimationFrame(animate);
      }

      pond.addEventListener('mousemove', (e) => {
        const r = pond.getBoundingClientRect();
        const cx = e.clientX - r.left;
        const cy = e.clientY - r.top;
        poi.style.left = cx + 'px';
        poi.style.top = cy + 'px';
      });

      // attempt catch when clicking inside pond and poi overlaps fish
      pond.addEventListener('click', (e) => {
        if (!running) return;
        if (poiBroken) { updateMessage('ポイが壊れています。リセットしてください。'); return; }
        const pr = poi.getBoundingClientRect();
        let caughtAny = false;
        for (const [id, f] of Array.from(fishList)) {
          const fr = f.el.getBoundingClientRect();
          // check overlap
          const overlap = !(fr.right < pr.left || fr.left > pr.right || fr.bottom < pr.top || fr.top > pr.bottom);
          if (overlap) {
            caughtAny = true;
            // determine success by probability
            if (Math.random() < catchProbability) {
              // success
              score += 1;
              scoreEl.textContent = score;
              // reduce probability for next catches
              catchProbability = Math.max(0.05, catchProbability * decayFactor);
              removeFish(id);
              updateMessage('うまくすくえた！');
              poi.classList.add('flash');
              setTimeout(() => poi.classList.remove('flash'), 1000);
            } else {
              // failure: poi breaks, life decreases
              scoops -= 1;
              scoopsEl.textContent = scoops;
              poiBroken = true;
              poi.classList.remove('flash');
              poi.classList.add('broken');
              catchProbability = 0.9;
              updateMessage('💥 すくえなかった！ポイが壊れた。');
              setTimeout(() => { poiBroken = false; poi.classList.remove('broken'); updateMessage('ポイを直しました。'); }, 1200);
              removeFish(id); // fish escapes
              if (scoops <= 0) { endGame('ポイが全部壊れた。ゲーム終了'); }
            }
            break; // handle only one fish per click
          }
        }
        if (!caughtAny) {
          updateMessage('金魚に重ねてクリックしてください。');
        }
      });

      function updateMessage(txt) { messageEl.textContent = txt; }

      function startGame() {
        if (running) return;
        running = true;
        score = 0; scoops = 3; catchProbability = 0.9; scoreEl.textContent = score; scoopsEl.textContent = scoops;
        updateMessage('開始！ポイを金魚に重ねてクリックしてください。');
        // spawn fish periodically (no time limit)
        spawnId = setInterval(() => createFish(), 700);
        createFish(); createFish();
        if (!rafId) rafId = requestAnimationFrame(animate);
      }

      function stopGame() {
        running = false;
        if (spawnId) { clearInterval(spawnId); spawnId = null; }
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        fishList.forEach((f) => { if (f._lifetime) clearTimeout(f._lifetime); if (f.el.parentElement) f.el.parentElement.removeChild(f.el); });
        fishList.clear();
      }

      function resetGame() { stopGame(); score = 0; scoops = 3; catchProbability = 0.9; scoreEl.textContent = score; scoopsEl.textContent = scoops; updateMessage('準備完了。開始を押してください。');
        // reset poi
        poiBroken = false; poi.classList.remove('broken'); }

      function endGame(text) { stopGame(); updateMessage(text + ` 得点: ${score} 点`); try{ fetch('{% url "save_score" %}', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ game:'kingyo', score }) }); }catch(e){} }

      startBtn.addEventListener('click', startGame);
      stopBtn.addEventListener('click', () => { stopGame(); updateMessage(`途中終了。得点 ${score} 点`); try{ fetch('{% url "save_score" %}', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ game:'kingyo', score }) }); }catch(e){} });
      resetBtn.addEventListener('click', resetGame);

      // back behavior
      const backBtn = document.getElementById('back-button');
      if (backBtn) {
        backBtn.addEventListener('click', function(e){ e.preventDefault(); stopGame(); const href=this.getAttribute('data-href')||'/'; const card=document.querySelector('.kingyo-card'); if(card){ card.style.transition='opacity 0.25s ease'; card.style.opacity='0'; } setTimeout(()=>{ window.location.href=href }, 260); });
      }

      resetGame();
    </script>
</body>
</html>
