{% load static %}
<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #111;
      color: #fff;
    }

    h1 {
      margin-bottom: 16px;
    }

    #game-container {
      position: relative;
      width: 360px;
      height: 360px;
      background: #222;
      border: 4px solid #4caf50;
    }

    #score {
      margin-top: 12px;
      font-size: 18px;
    }

    #message {
      margin-top: 12px;
      color: #f44336;
    }

    button {
      margin-top: 16px;
      padding: 10px 18px;
      border: none;
      border-radius: 4px;
      background: #4caf50;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #43a047;
    }
  </style>
</head>

<body>
  <h1>Snake Game</h1>
  <div id="game-container"></div>
  <div id="score">Score: 0</div>
  <div id="message">Use arrow keys or WASD to move.</div>
  <button id="restart">Restart</button>
  <button id="back-button" class="back-link-button" data-href="{% url 'index' %}">トップに戻る</button>
  <script>
    const container = document.getElementById('game-container');
    const scoreText = document.getElementById('score');
    const message = document.getElementById('message');
    const restartButton = document.getElementById('restart');
    const gridSize = 18;
    const cellSize = container.clientWidth / gridSize;

    let snake = [{ x: 9, y: 9 }];
    let direction = { x: 0, y: 0 };
    let food = null;
    let score = 0;
    let gameOver = false;
    let intervalId = null;

    function createCell(x, y, color) {
      const cell = document.createElement('div');
      cell.style.position = 'absolute';
      cell.style.left = `${x * cellSize}px`;
      cell.style.top = `${y * cellSize}px`;
      cell.style.width = `${cellSize}px`;
      cell.style.height = `${cellSize}px`;
      cell.style.background = color;
      return cell;
    }

    function placeFood() {
      const x = Math.floor(Math.random() * gridSize);
      const y = Math.floor(Math.random() * gridSize);
      if (snake.some(segment => segment.x === x && segment.y === y)) {
        placeFood();
        return;
      }
      food = { x, y };
    }

    function draw() {
      container.innerHTML = '';
      snake.forEach((segment, index) => {
        const color = index === 0 ? '#8bc34a' : '#cddc39';
        container.appendChild(createCell(segment.x, segment.y, color));
      });
      if (food) {
        container.appendChild(createCell(food.x, food.y, '#ff5722'));
      }
    }

    function update() {
      if (gameOver || direction.x === 0 && direction.y === 0) return;

      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
        endGame('Game over. Hit the wall.');
        return;
      }
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        endGame('Game over. Hit yourself.');
        return;
      }

      snake.unshift(head);

      if (food && head.x === food.x && head.y === food.y) {
        score += 1;
        scoreText.innerText = `Score: ${score}`;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame(text) {
      gameOver = true;
      message.innerText = text;
      if (intervalId) clearInterval(intervalId);
      // save high score
      try { fetch('{% url "save_score" %}', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ game: 'snake', score }) }); } catch (e) {}
    }

    function restart() {
      snake = [{ x: 9, y: 9 }];
      direction = { x: 0, y: 0 };
      score = 0;
      gameOver = false;
      scoreText.innerText = 'Score: 0';
      message.innerText = 'Use arrow keys or WASD to move.';
      placeFood();
      draw();
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(update, 150);
    }

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      if (key === 'arrowup' || key === 'w') {
        if (direction.y !== 1) direction = { x: 0, y: -1 };
      } else if (key === 'arrowdown' || key === 's') {
        if (direction.y !== -1) direction = { x: 0, y: 1 };
      } else if (key === 'arrowleft' || key === 'a') {
        if (direction.x !== 1) direction = { x: -1, y: 0 };
      } else if (key === 'arrowright' || key === 'd') {
        if (direction.x !== -1) direction = { x: 1, y: 0 };
      }
    });

    restartButton.addEventListener('click', restart);
    restart();

    // back button: stop game then fade and navigate to index
    const backBtn = document.getElementById('back-button');
    if (backBtn) {
      backBtn.addEventListener('click', function (e) {
        e.preventDefault();
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        const href = this.getAttribute('data-href') || '/';
        document.body.style.transition = 'opacity 0.25s ease';
        document.body.style.opacity = '0';
        setTimeout(() => { window.location.href = href; }, 260);
      });
    }
  </script>
</body>

</html>
